# StellarKeep AI - tester deployment
#   1. Install Ollama natively (ollama.com):  ollama pull qwen3:0.6b
#   2. docker compose -f docker/docker-compose.yml up --build
#   3. open http://localhost:3000
services:
  stellarkeep:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
      - "8000:8000"
      - "8001:8001"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - RAG_CONFIG_MODE=cpu_fast
      - GENERATION_MODEL=qwen3:0.6b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - stellarkeep_index:/app/index_store
      - stellarkeep_lancedb:/app/lancedb
      - stellarkeep_reports:/app/reports
      - stellarkeep_uploads:/app/shared_uploads
    restart: unless-stopped
volumes:
  stellarkeep_index:
  stellarkeep_lancedb:
  stellarkeep_reports:
  stellarkeep_uploads:
